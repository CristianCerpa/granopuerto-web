<!DOCTYPE html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Granopuerto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0e0d0b;
      color: #f2f2f2;
       font-family: "Cormorant Garamond", Georgia, serif;
    }

    /* HERO */
    .hero {
      height: 100vh;
      position: relative;
 background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding-top: 10px;
    }
@media (max-width: 767px) {

  .hero {
    height: 75vh;
  }
    .overlay {
      position: absolute;
      inset: 0;
 background: transparent;
    }
}
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 800px;
    }

    .logo {
      width: 260px;
      margin-bottom: 15px;
    }

    .headline {
      font-family: "Georgia", serif;
      font-size: 28px;
      letter-spacing: 3px;
      margin: 0;
      font-weight: 400;
      color: #f2f2f2;
    }
@media (max-width: 767px) {
    .subheadline {
       font-family: "Inter", Arial, sans-serif;
      margin-top: 20px;
      margin-bottom: 70px;
      font-size: 18px;
      color: #cfcfcf;
      letter-spacing: 1px;
    }

    .line {
      width: 80px;
      height: 1px;
      background: #888;
      margin: 10px auto;
    }

    /* SECTION */
    .section {
      padding: 0px 20px 30px;
      max-width: 780px;
      margin: -250px auto 0 auto;
      text-align: center;
        position: relative;
  z-index: 5;
      background: transparent;
    }

    .title {
      font-family: "Georgia", serif;
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: 0.5px;
      color: #ffffff;
      margin-bottom: 18px;
    }

    .block {
      font-size: 18px;
      line-height: 1.5;
      letter-spacing: 0.2px;
      color: #d6d6d6;
      max-width: 620px;
      margin: 0 auto;
}
    .block p {
    margin-bottom: 0px;
      }
.section p:last-of-type {
  margin-bottom: 40px;
  }
    
    /* CTA */
    .cta {
      margin-top: 20px;
    }

    .btn {
       font-family: "Inter", Arial, sans-serif;
      display: inline-block;
      padding: 12px 26px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    /* IMAGEN FINAL (NUEVO) */
    .image-section {
       padding: 40px 20px 20px;
      text-align: center;
    }

    .image-section img {
      width: 80%;
      max-width: 650px;
      height: auto;
      mix-blend-mode: lighten;
      opacity: 0.88;
      margin-top: -5px;
    }

    /* FOOTER */
    .footer{
      font-family: "Inter", Arial, sans-serif;
      padding: 80px 20px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 3px;
      color: #666;
    }

    /* RESPONSIVE */
    @media (min-width: 768px) {
      .headline {
        font-size: 25px;
         letter-spacing: 2px;
      }

      .title {
        font-size: 26px;
      }

      .block {
        font-size: 16px;
            line-height: 1.7;
    padding: 0 10px;
      }
      
  .subheadline {
    font-size: 15px;
    line-height: 1.5;
  }

  .footer {
    font-size: 9px;
    letter-spacing: 2px;
  }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <img src="logo.png" class="logo">

      <div class="line"></div>

      <div class="subheadline">
        Café de especialidad tostado y envasado en Valparaíso
      </div>
    </div>
  </section>

  <!-- CONTENIDO -->
  <section class="section">
    <p class="title"><strong>Granopuerto no es solo café</strong></p>

    <p class="block">
      Es historia, viaje y carácter porteño en cada sorbo.<br>
      Granos seleccionados del mundo, transformados en una experiencia única.
    </p>

    <div class="cta">
      <a href="#" class="btn">PRÓXIMAMENTE TIENDA</a>
    </div>
  </section>

  <!-- IMAGEN FINAL (NUEVO) -->
  <section class="image-section">
    <img src="valparaiso.png" alt="Valparaíso origen pacífico">
  </section>

  <!-- FOOTER -->
  <footer class="footer">
   © 2026 Granopuerto · todos los derechos reservados
  </footer>

</body>
</html>
