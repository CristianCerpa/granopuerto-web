<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Granopuerto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    /* HERO */
    .hero {
      height: 100vh;
      position: relative;
      background: url('fondo.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.85)
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 800px;
    }

    .logo {
      width: 260px;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    .headline {
      font-family: "Georgia", serif;
      font-size: 52px;
      letter-spacing: 4px;
      margin: 0;
    }

    .subheadline {
      margin-top: 20px;
      font-size: 18px;
      color: #cfcfcf;
      letter-spacing: 1px;
    }

    .line {
      width: 80px;
      height: 1px;
      background: #888;
      margin: 30px auto;
    }

    /* SECTION */
    .section {
      padding: 120px 20px;
      max-width: 720px;
      margin: auto;
      text-align: center;
    }

.section p {
  font-size: 18px;
  line-height: 1.7;
  margin: 6px 0;
  color: #ddd;
}
    }

    .section strong {
      font-family: "Georgia", serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 1px;
    }

    /* CTA */
    .cta {
      margin-top: 40px;
    }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    /* FOOTER */
    .footer {
      padding: 80px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 4px;
      color: #666;
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <img src="logo.png" class="logo">

      <h1 class="headline">UN VIAJE EN CADA TAZA</h1>

      <div class="line"></div>

      <div class="subheadline">
        Café de especialidad tostado y envasado en Valparaíso
      </div>
    </div>
  </section>

  <!-- CONTENIDO -->
<section class="section">
<p><strong>Granopuerto no es solo café.</strong></p>

<p class="block">
  Es historia, viaje y carácter porteño en cada sorbo.<br>
  Granos seleccionados del mundo, transformados en una experiencia única.
</p>

    <div class="cta">
      <a href="#" class="btn">PRÓXIMAMENTE TIENDA</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    VALPARAÍSO · PACÍFICO · ORIGEN
  </footer>

</body>
</html>
