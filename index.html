<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Granopuerto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0a0a0a;
      color: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    /* HERO */
    .hero {
      height: 100vh;
      position: relative;
      background: url('fondo.jpg') center/cover no-repeat;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding-top: 10px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.85)
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 800px;
    }

    .logo {
      width: 260px;
      margin-bottom: 15px;
    }

    .headline {
      font-family: "Georgia", serif;
      font-size: 28px;
      letter-spacing: 3px;
      margin: 0;
      font-weight: 400;
      color: #f2f2f2;
    }

    .subheadline {
      margin-top: 20px;
      font-size: 18px;
      color: #cfcfcf;
      letter-spacing: 1px;
    }

    .line {
      width: 80px;
      height: 1px;
      background: #888;
      margin: 10px auto;
    }

    /* SECTION */
    .section {
      padding: 0px 20px 30px;
      max-width: 780px;
      margin: -100px auto 0 auto;
      text-align: center;
        position: relative;
  z-index: 5;
    }

    .title {
      font-family: "Georgia", serif;
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: 0.5px;
      color: #ffffff;
      margin-bottom: 28px;
    }

    .block {
      font-size: 18px;
      line-height: 1;
      letter-spacing: 0.2px;
      color: #d6d6d6;
      max-width: 620px;
      margin: 0 auto;
    }
.section p:last-of-type {
  margin-bottom: 40px;
  }
    
    /* CTA */
    .cta {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 2px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    /* IMAGEN FINAL (NUEVO) */
    .image-section {
       padding: 40px 20px 20px;
      text-align: center;
    }

    .image-section img {
      width: 80%;
      max-width: 650px;
      height: auto;
      border-radius: 6px;
      opacity: 0.95;
      margin-top: -5px;
    }

    /* FOOTER */
    .footer {
      padding: 80px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 4px;
      color: #666;
    }

    /* RESPONSIVE */
    @media (min-width: 768px) {
      .headline {
        font-size: 25px;
         letter-spacing: 2px;
      }

      .title {
        font-size: 26px;
      }

      .block {
        font-size: 19px;
      }
    }

  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <img src="logo.png" class="logo">

      <div class="line"></div>

      <div class="subheadline">
        Café de especialidad tostado y envasado en Valparaíso
      </div>
    </div>
  </section>

  <!-- CONTENIDO -->
  <section class="section">
    <p class="title"><strong>Granopuerto no es solo café</strong></p>

    <p class="block">
      Es historia, viaje y carácter porteño en cada sorbo.<br><br>
      Granos seleccionados del mundo, transformados en una experiencia única.
    </p>

    <div class="cta">
      <a href="#" class="btn">PRÓXIMAMENTE TIENDA</a>
    </div>
  </section>

  <!-- IMAGEN FINAL (NUEVO) -->
  <section class="image-section">
    <img src="valparaiso.jpg" alt="Valparaíso origen pacífico">
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    VALPARAÍSO · PACÍFICO · ORIGEN
  </footer>

</body>
</html>
